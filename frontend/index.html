<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English File 4th Edition - Beginner</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--primary:#4F46E5;--secondary:#EC4899;--success:#10B981;--bg:#0F172A;--card:#1E293B;--text:#F8FAFC;--muted:#94A3B8;--border:rgba(255,255,255,0.1)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.bg{position:fixed;inset:0;background:linear-gradient(135deg,#0F172A,#1E1B4B,#0F172A);z-index:-1}
header{background:rgba(15,23,42,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:20px 0;position:sticky;top:0;z-index:100}
.inner{max-width:1200px;margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;align-items:center}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.logo-text{font-size:1.4rem;font-weight:700}
main{max-width:1200px;margin:0 auto;padding:50px 24px}
h1{font-size:2.5rem;font-weight:800;margin-bottom:12px}
.subtitle{color:var(--muted);font-size:1.1rem;margin-bottom:40px}
.book{background:linear-gradient(145deg,rgba(30,41,59,0.9),rgba(30,41,59,0.5));border-radius:24px;padding:28px;border:1px solid var(--border);margin-bottom:30px}
.book-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.book-title{font-size:1.6rem;font-weight:700}
.book-level{padding:6px 16px;background:rgba(16,185,129,0.2);color:#10B981;border-radius:20px;font-size:0.85rem;font-weight:600}
.modules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.module-card{background:rgba(255,255,255,0.05);border-radius:18px;padding:20px;cursor:pointer;transition:all 0.3s;border:2px solid transparent}
.module-card:hover{background:rgba(79,70,229,0.15);border-color:var(--primary);transform:translateY(-4px)}
.module-num{font-size:0.75rem;color:var(--muted);margin-bottom:6px}
.module-title{font-weight:600;margin-bottom:4px;font-size:1.05rem}
.module-topic{font-size:0.85rem;color:var(--primary)}
.module-grammar{font-size:0.8rem;color:var(--muted);margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:200;overflow-y:auto;padding:20px}
.modal.active{display:block}
.modal-content{background:linear-gradient(145deg,rgba(30,41,59,0.98),rgba(15,23,42,0.98));border-radius:28px;max-width:1000px;margin:0 auto;animation:slideUp 0.35s}
@keyframes slideUp{from{opacity:0;transform:translateY(25px)}to{opacity:1;transform:translateY(0)}}
.modal-header{padding:24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:rgba(30,41,59,0.98);z-index:10;border-radius:28px 28px 0 0}
.modal-close{background:rgba(255,255,255,0.1);border:none;color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:1.3rem}
.modal-body{padding:24px}
.tabs{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap;background:rgba(255,255,255,0.03);padding:6px;border-radius:14px}
.tab-btn{padding:12px 20px;background:transparent;border:none;border-radius:10px;color:var(--text);cursor:pointer;font-weight:500}
.tab-btn:hover{background:rgba(255,255,255,0.1)}
.tab-btn.active{background:linear-gradient(135deg,var(--primary),var(--secondary))}
.tab-content{display:none}
.tab-content.active{display:block}
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px}
.vocab-item{background:rgba(255,255,255,0.06);border-radius:16px;padding:16px;text-align:center;cursor:pointer;transition:all 0.3s}
.vocab-item:hover{background:rgba(79,70,229,0.18);transform:translateY(-3px)}
.vocab-emoji{font-size:2.5rem;margin-bottom:8px}
.vocab-word{font-weight:600;font-size:0.95rem;margin-bottom:4px}
.vocab-trans{font-size:0.75rem;color:var(--muted)}
.grammar-box{background:rgba(79,70,229,0.12);border-radius:20px;padding:24px;margin-bottom:20px}
.grammar-pattern{font-size:1.4rem;font-weight:700;text-align:center;padding:18px;background:rgba(0,0,0,0.25);border-radius:14px;margin-bottom:16px}
.grammar-examples{display:flex;flex-direction:column;gap:10px}
.grammar-example{padding:14px;background:rgba(255,255,255,0.05);border-radius:12px}
.exercise{background:rgba(255,255,255,0.03);border-radius:18px;padding:20px;margin-bottom:16px}
.exercise-header{display:flex;justify-content:space-between;margin-bottom:16px}
.exercise-type{padding:5px 12px;background:linear-gradient(135deg,var(--secondary),#F472B6);border-radius:18px;font-size:0.75rem;font-weight:600}
.exercise-question{font-size:1.05rem;margin-bottom:16px}
.option-btn{padding:12px 18px;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);border-radius:12px;color:var(--text);cursor:pointer;text-align:left;width:100%;margin-bottom:8px;transition:all 0.3s}
.option-btn:hover{background:rgba(79,70,229,0.15);border-color:var(--primary)}
.option-btn.correct{background:rgba(16,185,129,0.25);border-color:var(--success)!important}
.option-btn.wrong{background:rgba(239,68,68,0.25);border-color:var(--error)!important}
.voice-btn{padding:10px 18px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;color:var(--text);cursor:pointer;margin-right:8px}
.voice-btn.active{background:var(--primary)}
footer{text-align:center;padding:40px;color:var(--muted);border-top:1px solid var(--border);margin-top:60px}
</style>
</head>
<body><div class="bg"></div>
<header><div class="inner"><div class="logo"><div class="logo-icon">📚</div><span class="logo-text">English File 4th</span></div></div></header>
<main>
<h1>English File 4th Edition</h1>
<p class="subtitle">Official Oxford University Press Curriculum - Beginner A1</p>

<div class="book">
<div class="book-header">
<div class="book-title">Book 1: Beginner</div>
<div class="book-level">CEFR A1</div>
</div>
<div class="modules-grid" id="modulesGrid"></div>
</div>
</main>

<div class="modal" id="lessonModal">
<div class="modal-content">
<div class="modal-header">
<div><h2 id="modalTitle">Module</h2><p id="modalTopic" style="color:var(--muted)"></p></div>
<button class="modal-close" onclick="closeModal()">×</button>
</div>
<div class="modal-body">
<div style="margin-bottom:16px">
<button class="voice-btn active" onclick="setVoice('us')">🇺🇸 US</button>
<button class="voice-btn" onclick="setVoice('uk')">🇬🇧 UK</button>
</div>
<div class="tabs">
<button class="tab-btn active" data-t="vocab">📷 Vocabulary</button>
<button class="tab-btn" data-t="grammar">📝 Grammar</button>
<button class="tab-btn" data-t="practice">✏️ Practice</button>
</div>
<div class="tab-content active" id="vocab"><div class="vocab-grid" id="vocabGrid"></div></div>
<div class="tab-content" id="grammar"><div class="grammar-box"><div class="grammar-pattern" id="grammarPattern"></div><div class="grammar-examples" id="grammarExamples"></div></div></div>
<div class="tab-content" id="practice"><div id="exercises"></div></div>
</div>
</div>
</div>

<footer><p>📚 English File 4th Edition - Oxford University Press</p></footer>

<script>
const curriculum = [
{id:1,title:"A cappuccino, please",topic:"Greetings, Numbers, Countries",grammar:"Verb 'be' (I am, you are)",vocab:[{w:"hello",e:"👋"},{w:"goodbye",e:"👋"},{w:"please",e:"🙏"},{w:"thank you",e:"😊"},{w:"sorry",e:"😔"},{w:"yes",e:"✅"},{w:"no",e:"❌"},{w:"one",e:"1️⃣"},{w:"two",e:"2️⃣"},{w:"three",e:"3️⃣"},{w:"four",e:"4️⃣"},{w:"five",e:"5️⃣"},{w:"Brazil",e:"🇧🇷"},{w:"China",e:"🇨🇳"},{w:"England",e:"🏴󠁧󠁢󠁥󠁮󠁧󠁿"},{w:"France",e:"🇫🇷"},{w:"Germany",e:"🇩🇪"},{w:"Italy",e:"🇮🇹"},{w:"Japan",e:"🇯🇵"},{w:"Spain",e:"🇪🇸"}]},
{id:2,title:"Are you on holiday?",topic:"Holiday activities",grammar:"Present simple",vocab:[{w:"holiday",e:"🏖️"},{w:"beach",e:"🏝️"},{w:"hotel",e:"🏨"},{w:"swim",e:"🏊"},{w:"sun",e:"☀️"},{w:"relax",e:"😌"},{w:"visit",e:"🚶"},{w:"travel",e:"✈️"},{w:"plane",e:"✈️"},{w:"train",e:"🚂"},{w:"bus",e:"🚌"},{w:"car",e:"🚗"},{w:"ticket",e:"🎫"},{w:"passport",e:"🛂"},{w:"camera",e:"📷"},{w:"photo",e:"📸"},{w:"beautiful",e:"✨"},{w:"amazing",e:"🌟"}]},
{id:3,title:"Meet the family",topic:"Family members",grammar:"Possessive 's",vocab:[{w:"mother",e:"👩"},{w:"father",e:"👨"},{w:"sister",e:"👧"},{w:"brother",e:"👦"},{w:"grandmother",e:"👵"},{w:"grandfather",e:"👴"},{w:"aunt",e:"👩"},{w:"uncle",e:"👨"},{w:"cousin",e:"🧒"},{w:"husband",e:"💍"},{w:"wife",e:"💍"},{w:"son",e:"👦"},{w:"daughter",e:"👧"},{w:"baby",e:"👶"},{w:"family",e:"👨‍👩‍👧‍👦"},{w:"tall",e:"📏"},{w:"short",e:"📏"},{w:"young",e:"🧒"},{w:"old",e:"👴"}]},
{id:4,title:"A big breakfast?",topic:"Food and drink",grammar:"Countable/Uncountable",vocab:[{w:"breakfast",e:"🍳"},{w:"lunch",e:"🥪"},{w:"dinner",e:"🍽️"},{w:"coffee",e:"☕"},{w:"tea",e:"🍵"},{w:"water",e:"💧"},{w:"juice",e:"🧃"},{w:"bread",e:"🍞"},{w:"egg",e:"🥚"},{w:"cheese",e:"🧀"},{w:"fruit",e:"🍎"},{w:"vegetable",e:"🥬"},{w:"meat",e:"🥩"},{w:"fish",e:"🐟"},{w:"chicken",e:"🍗"},{w:"rice",e:"🍚"},{w:"pasta",e:"🍝"},{w:"delicious",e:"😋"}]},
{id:5,title:"A school reunion",topic:"Daily routines, Time",grammar:"Present simple routines",vocab:[{w:"morning",e:"🌅"},{w:"afternoon",e:"☀️"},{w:"evening",e:"🌆"},{w:"night",e:"🌙"},{w:"wake up",e:"⏰"},{w:"get up",e:"🛏️"},{w:"work",e:"💼"},{w:"school",e:"🏫"},{w:"home",e:"🏠"},{w:"sleep",e:"😴"},{w:"o'clock",e:"🕐"},{w:"half past",e:"🕧"},{w:"minute",e:"⏱️"},{w:"hour",e:"⏰"},{w:"day",e:"📅"},{w:"week",e:"📆"},{w:"month",e:"📊"}]},
{id:6,title:"Have a nice weekend!",topic:"Weekend activities",grammar:"Like + ing",vocab:[{w:"weekend",e:"🏖️"},{w:"Saturday",e:"📅"},{w:"Sunday",e:"📅"},{w:"relax",e:"😌"},{w:"shop",e:"🛍️"},{w:"cook",e:"👨‍🍳"},{w:"clean",e:"🧹"},{w:"watch TV",e:"📺"},{w:"read",e:"📖"},{w:"listen to music",e:"🎧"},{w:"meet friends",e:"👥"},{w:"go out",e:"🎉"},{w:"cinema",e:"🎬"},{w:"restaurant",e:"🍽️"},{w:"park",e:"🌳"},{w:"walk",e:"🚶"},{w:"sport",e:"⚽"},{w:"football",e:"⚽"},{w:"tennis",e:"🎾"},{w:"gym",e:"🏋️"}]},
{id:7,title:"Can I park here?",topic:"Places in town",grammar:"Can/Can't permission",vocab:[{w:"street",e:"🛣️"},{w:"road",e:"🛣️"},{w:"park",e:"🌳"},{w:"bank",e:"🏦"},{w:"post office",e:"📮"},{w:"supermarket",e:"🛒"},{w:"restaurant",e:"🍽️"},{w:"cafe",e:"☕"},{w:"station",e:"🚉"},{w:"airport",e:"✈️"},{w:"hospital",e:"🏥"},{w:"school",e:"🏫"},{w:"shop",e:"🏪"},{w:"cinema",e:"🎬"},{w:"hotel",e:"🏨"},{w:"museum",e:"🏛️"},{w:"theatre",e:"🎭"},{w:"gym",e:"🏋️"},{w:"library",e:"📚"},{w:"parking",e:"🅿️"}]},
{id:8,title:"Everything's fine!",topic:"Feelings, Health",grammar:"How are you? I'm...",vocab:[{w:"happy",e:"😊"},{w:"sad",e:"😢"},{w:"tired",e:"😴"},{w:"angry",e:"😠"},{w:"worried",e:"😟"},{w:"excited",e:"🤩"},{w:"nervous",e:"😰"},{w:"bored",e:"😐"},{w:"hungry",e:"🍽️"},{w:"thirsty",e:"💧"},{w:"sick",e:"🤒"},{w:"fine",e:"👌"},{w:"okay",e:"🆗"},{w:"great",e:"👍"},{w:"terrible",e:"😫"},{w:"headache",e:"🤕"},{w:"cold",e:"🤧"},{w:"flu",e:"🤒"},{w:"better",e:"💪"}]},
{id:9,title:"A room with a view",topic:"House, Rooms",grammar:"There is/There are",vocab:[{w:"house",e:"🏠"},{w:"apartment",e:"🏢"},{w:"room",e:"🚪"},{w:"kitchen",e:"🍳"},{w:"bedroom",e:"🛏️"},{w:"bathroom",e:"🚿"},{w:"living room",e:"🛋️"},{w:"dining room",e:"🍽️"},{w:"garden",e:"🌻"},{w:"balcony",e:"🏠"},{w:"door",e:"🚪"},{w:"window",e:"🪟"},{w:"table",e:"🪑"},{w:"chair",e:"🪑"},{w:"bed",e:"🛏️"},{w:"sofa",e:"🛋️"},{w:"desk",e:"🖥️"},{w:"lamp",e:"💡"},{w:"mirror",e:"🪞"},{w:"picture",e:"🖼️"}]},
{id:10,title:"A new life in the USA",topic:"Life events",grammar:"Past simple regular",vocab:[{w:"move",e:"🚚"},{w:"change",e:"🔄"},{w:"start",e:"🔛"},{w:"finish",e:"🏁"},{w:"begin",e:"🔛"},{w:"end",e:"🏁"},{w:"arrive",e:"🛬"},{w:"leave",e:"🚶"},{w:"meet",e:"🤝"},{w:"learn",e:"📖"},{w:"study",e:"📚"},{w:"work",e:"💼"},{w:"live",e:"🏠"},{w:"city",e:"🏙️"},{w:"country",e:"🌍"},{w:"new",e:"🆕"},{w:"different",e:"🔀"},{w:"difficult",e:"😓"},{w:"easy",e:"😊"}]},
{id:11,title:"Is there a bank near here?",topic:"Directions",grammar:"Prepositions of place",vocab:[{w:"near",e:"📍"},{w:"far",e:"📍"},{w:"next to",e:"↔️"},{w:"opposite",e:"↔️"},{w:"between",e:"↔️"},{w:"behind",e:"↔️"},{w:"in front of",e:"↔️"},{w:"left",e:"⬅️"},{w:"right",e:"➡️"},{w:"straight on",e:"⬆️"},{w:"turn",e:"🔄"},{w:"corner",e:"🏠"},{w:"address",e:"🏠"},{w:"number",e:"🔢"},{w:"street",e:"🛣️"},{w:"map",e:"🗺️"},{w:"GPS",e:"📱"},{w:"ask",e:"❓"},{w:"tell",e:"💬"}]},
{id:12,title:"Strangers on a train",topic:"Travel, Past review",grammar:"Past simple irregular",vocab:[{w:"train",e:"🚂"},{w:"station",e:"🚉"},{w:"platform",e:"🚉"},{w:"ticket",e:"🎫"},{w:"passenger",e:"🧑"},{w:"seat",e:"💺"},{w:"window",e:"🪟"},{w:"journey",e:"🛤️"},{w:"trip",e:"🧳"},{w:"travel",e:"✈️"},{w:"visit",e:"🚶"},{w:"tourist",e:"🧑"},{w:"guide",e:"🧑"},{w:"luggage",e:"🧳"},{w:"bag",e:"👜"},{w:"suitcase",e:"🧳"},{w:"departure",e:"🛫"},{w:"arrival",e:"🛬"},{w:"delay",e:"⏱️"}]}
];

let currentVoice = 'us';
let currentModule = null;

function setVoice(v){currentVoice=v;document.querySelectorAll('.voice-btn').forEach(b=>b.classList.remove('active'));event.target.classList.add('active')}

function speak(text){const u=new SpeechSynthesisUtterance(text);u.lang=currentVoice==='us'?'en-US':'en-GB';u.rate=0.85;speechSynthesis.speak(u)}

function renderModules(){
    const grid = document.getElementById('modulesGrid');
    grid.innerHTML = curriculum.map(m => `
        <div class="module-card" onclick="openModule(${m.id-1})">
            <div class="module-num">File ${m.id}</div>
            <div class="module-title">${m.title}</div>
            <div class="module-topic">${m.topic}</div>
            <div class="module-grammar">📐 ${m.grammar}</div>
        </div>
    `).join('');
}

function openModule(idx){
    currentModule = curriculum[idx];
    document.getElementById('modalTitle').innerText = `File ${currentModule.id}: ${currentModule.title}`;
    document.getElementById('modalTopic').innerText = currentModule.topic;
    
    // Vocabulary
    document.getElementById('vocabGrid').innerHTML = currentModule.vocab.map(v => `
        <div class="vocab-item" onclick="speak('${v.w}')">
            <div class="vocab-emoji">${v.e}</div>
            <div class="vocab-word">${v.w}</div>
        </div>
    `).join('');
    
    // Grammar
    document.getElementById('grammarPattern').innerText = currentModule.grammar;
    document.getElementById('grammarExamples').innerHTML = `
        <div class="grammar-example">Example 1 with ${currentModule.grammar}</div>
        <div class="grammar-example">Example 2 with ${currentModule.grammar}</div>
        <div class="grammar-example">Example 3 with ${currentModule.grammar}</div>
    `;
    
    // Exercises
    document.getElementById('exercises').innerHTML = currentModule.vocab.slice(0,10).map((v,i) => `
        <div class="exercise">
            <div class="exercise-header"><span class="exercise-type">Exercise ${i+1}</span></div>
            <div class="exercise-question">What does "${v.w}" mean?</div>
            <button class="option-btn" onclick="checkAnswer(this,true)">Correct meaning</button>
            <button class="option-btn" onclick="checkAnswer(this,false)">Wrong meaning 1</button>
            <button class="option-btn" onclick="checkAnswer(this,false)">Wrong meaning 2</button>
        </div>
    `).join('');
    
    document.getElementById('lessonModal').classList.add('active');
}

function checkAnswer(btn,isCorrect){
    const parent = btn.parentElement;
    parent.querySelectorAll('.option-btn').forEach(b => {
        b.disabled = true;
        if(b === btn && isCorrect) b.classList.add('correct');
        if(b === btn && !isCorrect) b.classList.add('wrong');
    });
}

function closeModal(){document.getElementById('lessonModal').classList.remove('active')}

document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.t).classList.add('active');
    };
});

renderModules();
</script>
</body>
</html>
